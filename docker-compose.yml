version: "3.9"

services:
  redis-1:
    image: redis:7-alpine
    container_name: typeahead-redis-1
    ports:
      - "6379:6379"
    volumes:
      - redis1-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  redis-2:
    image: redis:7-alpine
    container_name: typeahead-redis-2
    ports:
      - "6380:6379"
    volumes:
      - redis2-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  redis-3:
    image: redis:7-alpine
    container_name: typeahead-redis-3
    ports:
      - "6381:6379"
    volumes:
      - redis3-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

volumes:
  redis1-data:
  redis2-data:
  redis3-data:
